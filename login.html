<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Elegance Beauty</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }

    .logo span { color: #ff4fa3; }

    .subtitulo {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      margin-bottom: 20px;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus { border-color: #ff4fa3; }

    button {
      width: 100%;
      padding: 14px;
      background: #ff4fa3;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #e03d90; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #555; cursor: not-allowed; }

    .erro {
      background: rgba(255, 80, 80, 0.12);
      border: 1px solid rgba(255, 80, 80, 0.3);
      color: #ff6b6b;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.88rem;
      margin-bottom: 20px;
      display: none;
    }

    .voltar {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: #666;
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.2s;
    }

    .voltar:hover { color: #ff4fa3; }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="logo">Elegance<span>Beauty</span></div>
    <p class="subtitulo">Área administrativa</p>

    <div class="erro" id="erro">Usuário ou senha incorretos.</div>

    <label for="usuario">Usuário</label>
    <input type="text" id="usuario" placeholder="Digite o usuário" autocomplete="username">

    <label for="senha">Senha</label>
    <input type="password" id="senha" placeholder="Digite a senha" autocomplete="current-password">

    <button id="btn-login">Entrar</button>

    <a href="index.html" class="voltar">← Voltar ao site</a>
  </div>

  <script>
    // Credenciais simples — troque conforme necessário
    const USUARIO_CORRETO = 'admin';
    const SENHA_CORRETA   = 'admin123';

    const btnLogin = document.getElementById('btn-login');
    const erroEl   = document.getElementById('erro');

    function tentarLogin() {
      const usuario = document.getElementById('usuario').value.trim();
      const senha   = document.getElementById('senha').value;

      if (usuario === USUARIO_CORRETO && senha === SENHA_CORRETA) {
        sessionStorage.setItem('admin_logado', 'true');
        window.location.href = 'admin.html';
      } else {
        erroEl.style.display = 'block';
        document.getElementById('senha').value = '';
        document.getElementById('senha').focus();
      }
    }

    btnLogin.addEventListener('click', tentarLogin);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') tentarLogin();
    });
  </script>

</body>
</html>
