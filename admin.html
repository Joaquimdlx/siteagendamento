<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Agendamentos</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 6%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo { font-size: 1.6rem; font-weight: 700; }
    .logo span { color: #ff4fa3; }

    .badge-admin {
      background: #ff4fa3;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-left: 10px;
      vertical-align: middle;
      letter-spacing: 0.05em;
    }

    .btn-sair {
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      padding: 8px 20px;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-sair:hover { border-color: #ff4fa3; color: #ff4fa3; }

    /* ── Main ── */
    main {
      padding: 40px 6%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-title {
      margin-bottom: 8px;
    }

    .page-title h1 {
      font-size: 1.6rem;
      font-weight: 600;
    }

    .page-title p {
      color: #666;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    /* ── Controles ── */
    .controles {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 20px;
      flex-wrap: wrap;
    }

    .busca {
      flex: 1;
      min-width: 200px;
      padding: 10px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .busca:focus { border-color: #ff4fa3; }
    .busca::placeholder { color: #555; }

    .btn-atualizar {
      padding: 10px 20px;
      background: #ff4fa3;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-atualizar:hover { background: #e03d90; }

    /* ── Contadores ── */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px 22px;
      min-width: 140px;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-valor {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 4px;
      color: #ff4fa3;
    }

    /* ── Tabela ── */
    .tabela-wrap {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #141414;
    }

    th {
      text-align: left;
      padding: 14px 20px;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
      font-weight: 500;
      border-bottom: 1px solid #2a2a2a;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    th:hover { color: #ff4fa3; }
    th .seta { margin-left: 4px; opacity: 0.5; font-size: 0.7rem; }
    th.ativo .seta { opacity: 1; color: #ff4fa3; }

    td {
      padding: 14px 20px;
      font-size: 0.9rem;
      border-bottom: 1px solid #1f1f1f;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: #1f1f1f; }

    .badge-servico {
      background: rgba(255, 79, 163, 0.12);
      color: #ff4fa3;
      border: 1px solid rgba(255, 79, 163, 0.2);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      white-space: nowrap;
    }

    .horario-pill {
      background: #222;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    /* ── Estados ── */
    .estado {
      text-align: center;
      padding: 60px 20px;
      color: #555;
    }

    .estado-icone {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #222;
      border-top-color: #ff4fa3;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsivo ── */
    @media (max-width: 600px) {
      th, td { padding: 12px 12px; font-size: 0.82rem; }
      .stats-bar { gap: 10px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      Elegance<span>Beauty</span>
      <span class="badge-admin">ADMIN</span>
    </div>
    <button class="btn-sair" id="btn-sair">Sair</button>
  </header>

  <main>
    <div class="page-title">
      <h1>Agendamentos</h1>
      <p>Todos os agendamentos registrados no sistema</p>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-label">Total</div>
        <div class="stat-valor" id="stat-total">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Hoje</div>
        <div class="stat-valor" id="stat-hoje">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Esta semana</div>
        <div class="stat-valor" id="stat-semana">—</div>
      </div>
    </div>

    <div class="controles">
      <input class="busca" id="busca" type="text" placeholder="Buscar por nome, serviço ou data...">
      <button class="btn-atualizar" id="btn-atualizar">⟳ Atualizar</button>
    </div>

    <div class="tabela-wrap">
      <table>
        <thead>
          <tr>
            <th data-col="nome">Nome <span class="seta">↕</span></th>
            <th data-col="data">Data <span class="seta">↕</span></th>
            <th data-col="horario">Horário <span class="seta">↕</span></th>
            <th data-col="servico">Serviço <span class="seta">↕</span></th>
            <th data-col="criadoEm">Criado em <span class="seta">↕</span></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>

  <script type="module">
    import { initializeApp }               from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, get, child } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    // ── Proteção de acesso ──────────────────────────────────────────────────
    if (sessionStorage.getItem('admin_logado') !== 'true') {
      window.location.href = 'login.html';
    }

    document.getElementById('btn-sair').addEventListener('click', () => {
      sessionStorage.removeItem('admin_logado');
      window.location.href = 'index.html';
    });

    // ── Firebase ────────────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyDMwDMR1K8oddW88U4pwJyGYsdl78HxbsM",
      authDomain:        "siteage-6d53b.firebaseapp.com",
      projectId:         "siteage-6d53b",
      databaseURL:       "https://siteage-6d53b-default-rtdb.firebaseio.com",
      storageBucket:     "siteage-6d53b.firebasestorage.app",
      messagingSenderId: "108429899895",
      appId:             "1:108429899895:web:eaeb5802432ec0f5fb2e72"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // ── Estado ──────────────────────────────────────────────────────────────
    let agendamentos = [];
    let colOrdem     = 'data';
    let crescente    = true;

    // ── Helpers ─────────────────────────────────────────────────────────────
    function formatarData(iso) {
      const [a, m, d] = iso.split('-');
      return `${d}/${m}/${a}`;
    }

    function formatarCriacao(iso) {
      const dt = new Date(iso);
      return dt.toLocaleDateString('pt-BR') + ' ' + dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function semanaAtual() {
      const hoje = new Date();
      const dia  = hoje.getDay() || 7;
      const seg  = new Date(hoje); seg.setDate(hoje.getDate() - dia + 1);
      const sex  = new Date(seg);  sex.setDate(seg.getDate() + 4);
      const fmt  = d => d.toISOString().split('T')[0];
      return { inicio: fmt(seg), fim: fmt(sex) };
    }

    // ── Carregar dados ───────────────────────────────────────────────────────
    async function carregar() {
      setEstado('carregando');
      try {
        const snap = await get(child(ref(db), 'agendamentos'));

        if (!snap.exists()) {
          agendamentos = [];
        } else {
          agendamentos = [];
          snap.forEach(item => {
            agendamentos.push({ id: item.key, ...item.val() });
          });
        }

        atualizarStats();
        renderizar();
      } catch (err) {
        console.error(err);
        setEstado('erro');
      }
    }

    // ── Stats ────────────────────────────────────────────────────────────────
    function atualizarStats() {
      const hoje   = new Date().toISOString().split('T')[0];
      const semana = semanaAtual();

      document.getElementById('stat-total').textContent  = agendamentos.length;
      document.getElementById('stat-hoje').textContent   = agendamentos.filter(a => a.data === hoje).length;
      document.getElementById('stat-semana').textContent = agendamentos.filter(a => a.data >= semana.inicio && a.data <= semana.fim).length;
    }

    // ── Renderizar tabela ────────────────────────────────────────────────────
    function renderizar() {
      const busca = document.getElementById('busca').value.toLowerCase();

      let lista = agendamentos.filter(a =>
        (a.nome    || '').toLowerCase().includes(busca) ||
        (a.servico || '').toLowerCase().includes(busca) ||
        (a.data    || '').includes(busca) ||
        (a.horario || '').includes(busca)
      );

      lista.sort((a, b) => {
        const va = (a[colOrdem] || '').toString().toLowerCase();
        const vb = (b[colOrdem] || '').toString().toLowerCase();
        if (va < vb) return crescente ? -1 : 1;
        if (va > vb) return crescente ?  1 : -1;
        return 0;
      });

      const tbody = document.getElementById('tbody');

      if (lista.length === 0) {
        tbody.innerHTML = `
          <tr><td colspan="5">
            <div class="estado">
              <div class="estado-icone">📋</div>
              <p>${busca ? 'Nenhum resultado encontrado.' : 'Nenhum agendamento cadastrado ainda.'}</p>
            </div>
          </td></tr>`;
        return;
      }

      tbody.innerHTML = lista.map(a => `
        <tr>
          <td>${a.nome || '—'}</td>
          <td>${a.data ? formatarData(a.data) : '—'}</td>
          <td><span class="horario-pill">${a.horario || '—'}</span></td>
          <td><span class="badge-servico">${a.servico || '—'}</span></td>
          <td>${a.criadoEm ? formatarCriacao(a.criadoEm) : '—'}</td>
        </tr>
      `).join('');
    }

    function setEstado(tipo) {
      const tbody = document.getElementById('tbody');
      if (tipo === 'carregando') {
        tbody.innerHTML = `<tr><td colspan="5"><div class="estado"><div class="spinner"></div><p>Carregando agendamentos...</p></div></td></tr>`;
      } else if (tipo === 'erro') {
        tbody.innerHTML = `<tr><td colspan="5"><div class="estado"><div class="estado-icone">⚠️</div><p>Erro ao conectar ao banco de dados. Verifique as regras do Firebase.</p></div></td></tr>`;
      }
    }

    // ── Ordenação por coluna ─────────────────────────────────────────────────
    document.querySelectorAll('th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (colOrdem === col) {
          crescente = !crescente;
        } else {
          colOrdem  = col;
          crescente = true;
        }
        document.querySelectorAll('th').forEach(t => t.classList.remove('ativo'));
        th.classList.add('ativo');
        th.querySelector('.seta').textContent = crescente ? '↑' : '↓';
        renderizar();
      });
    });

    // ── Busca em tempo real ──────────────────────────────────────────────────
    document.getElementById('busca').addEventListener('input', renderizar);

    // ── Botão atualizar ──────────────────────────────────────────────────────
    document.getElementById('btn-atualizar').addEventListener('click', carregar);

    // ── Init ─────────────────────────────────────────────────────────────────
    carregar();
  </script>

</body>
</html>
